<!DOCTYPE html>
<html>
<head>
    <title>CBS Coverage Map - Human Flatus Atlas</title>
    <style>
        body { font-family: 'Helvetica', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f0f4f8; color: #1a2a3a; }
        
        header { 
            background: linear-gradient(135deg, #cc0000, #990000);
            color: white; 
            padding: 40px 20px; 
            text-align: center; 
            border-radius: 0 0 20px 20px; 
        }
        
        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        header p { font-size: 1.6rem; font-weight: 600; margin: 0; }
        
        .container { max-width: 1200px; margin: 3rem auto; background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .map-container { 
            position: relative; 
            width: 100%; 
            height: 600px; 
            background-color: #f8f9fa; 
            border: 2px solid #cc0000; 
            border-radius: 8px; 
            overflow: hidden; 
            margin-bottom: 30px;
        }
        
        .map-image { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            object-position: center;
        }
        
        .map-overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.7);
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }
        
        .station-marker { 
            position: absolute; 
            width: 12px; 
            height: 12px; 
            background-color: #ff0000; 
            border: 2px solid white; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            cursor: pointer; 
            transition: all 0.3s; 
            z-index: 10;
        }
        
        .station-marker:hover { 
            background-color: #cc0000; 
            transform: translate(-50%, -50%) scale(1.5); 
            box-shadow: 0 0 10px rgba(204, 0, 0, 0.5);
        }
        
        .station-info { 
            background: rgba(0, 0, 0, 0.9); 
            color: white; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            position: absolute; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            opacity: 0; 
            transition: opacity 0.3s;
            max-width: 200px;
            text-align: center;
        }
        
        .map-overlay:hover .station-info { 
            opacity: 1; 
        }
        
        .legend { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(0, 0, 0, 0.9); 
            color: white; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 0.8rem;
        }
        
        .legend-item { 
            margin-bottom: 8px; 
            display: flex; 
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot { 
            width: 12px; 
            height: 12px; 
            background-color: #ff0000; 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
        }
        
        .back-button { 
            background-color: #cc0000; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 6px; 
            text-decoration: none; 
            font-weight: bold; 
            display: inline-block; 
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }
        .back-button:hover { background-color: #990000; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-top: 20px;
        }
        
        .stat-card { 
            background: linear-gradient(135deg, #f8f9fa, #e9ecef); 
            padding: 20px; 
            border-radius: 8px; 
            border-left: 5px solid #cc0000; 
            text-align: center;
        }
        
        .stat-number { 
            font-size: 2rem; 
            font-weight: bold; 
            color: #cc0000; 
            margin-bottom: 5px;
        }
        
        .stat-label { 
            font-size: 0.9rem; 
            color: #666; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <header>
        <h1>CBS Coverage Map</h1>
        <p style="font-size: 1.4rem; font-weight: 600;">Smart Underwear National Distribution</p>
    </header>
    
    <div class="container">
        <a href="index.html" class="back-button">← Back to Main</a>
        <a href="cbs-hits.html" class="back-button">📺 CBS Coverage Details</a>
        
        <!-- Interactive Coverage Map -->
        <div class="map-container">
            <img src="https://i.imgur.com/8xG7Yz7.png" alt="CBS Coverage Map" class="map-image">
            
            <div class="map-overlay">
                <!-- Station Markers -->
                <div class="station-marker" style="top: 35%; left: 25%;" title="Baltimore, MD - Original Story"></div>
                <div class="station-marker" style="top: 40%; left: 45%;" title="Washington, D.C. - National Hub"></div>
                <div class="station-marker" style="top: 30%; left: 65%;" title="New York, NY - Major Market"></div>
                <div class="station-marker" style="top: 55%; left: 35%;" title="Chicago, IL - Midwest Hub"></div>
                <div class="station-marker" style="top: 45%; left: 15%;" title="Los Angeles, CA - West Coast"></div>
                <div class="station-marker" style="top: 25%; left: 75%;" title="San Francisco, CA - Tech Hub"></div>
                <div class="station-marker" style="top: 65%; left: 85%;" title="Boston, MA - Northeast Hub"></div>
                <div class="station-marker" style="top: 70%; left: 25%;" title="Miami, FL - Southeast Hub"></div>
                <div class="station-marker" style="top: 35%; left: 55%;" title="Dallas, TX - South Central"></div>
                <div class="station-marker" style="top: 50%; left: 75%;" title="Denver, CO - Mountain West"></div>
                <div class="station-marker" style="top: 60%; left: 45%;" title="Seattle, WA - Northwest Hub"></div>
                <div class="station-marker" style="top: 40%; left: 65%;" title="Atlanta, GA - Southeast Hub"></div>
                
                <!-- Station Information -->
                <div class="station-info" id="station-info">
                    <strong>Baltimore, MD</strong><br>
                    Original Story Source<br>
                    March 16, 2026
                </div>
            </div>
            
            <div class="legend">
                <h3 style="color: white; margin-top: 0; margin-bottom: 15px;">Coverage Legend</h3>
                <div class="legend-item">
                    <div class="legend-dot"></div>
                    <span>Original Story</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background-color: #cc0000;"></div>
                    <span>Affiliate Pickup</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background-color: #cc0000;"></div>
                    <span>Major Market</span>
                </div>
            </div>
        </div>
        
        <!-- Coverage Statistics -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number">8+</div>
                <div class="stat-label">CBS Affiliates</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">31</div>
                <div class="stat-label">States + D.C.</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">53M+</div>
                <div class="stat-label">Weekly Viewers</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">February 18, 2026</div>
                <div class="stat-label">Distribution Date</div>
            </div>
        </div>
        
        <script>
            // Interactive map functionality
            const stations = [
                { id: 'baltimore', name: 'Baltimore, MD', top: '35%', left: '25%', type: 'original', date: 'March 16, 2026' },
                { id: 'washington', name: 'Washington, D.C.', top: '40%', left: '45%', type: 'hub' },
                { id: 'newyork', name: 'New York, NY', top: '55%', left: '65%', type: 'major' },
                { id: 'chicago', name: 'Chicago, IL', top: '45%', left: '35%', type: 'hub' },
                { id: 'losangeles', name: 'Los Angeles, CA', top: '25%', left: '75%', type: 'major' },
                { id: 'sanfrancisco', name: 'San Francisco, CA', top: '65%', left: '85%', type: 'tech' },
                { id: 'boston', name: 'Boston, MA', top: '70%', left: '25%', type: 'hub' },
                { id: 'miami', name: 'Miami, FL', top: '35%', left: '55%', type: 'hub' },
                { id: 'dallas', name: 'Dallas, TX', top: '50%', left: '75%', type: 'regional' },
                { id: 'denver', name: 'Denver, CO', top: '60%', left: '45%', type: 'regional' },
                { id: 'seattle', name: 'Seattle, WA', top: '40%', left: '65%', type: 'hub' },
                { id: 'atlanta', name: 'Atlanta, GA', top: '40%', left: '65%', type: 'hub' }
            ];
            
            const markers = document.querySelectorAll('.station-marker');
            const stationInfo = document.getElementById('station-info');
            
            markers.forEach(marker => {
                marker.addEventListener('click', function() {
                    const station = stations.find(s => s.id === marker.id);
                    if (station) {
                        stationInfo.innerHTML = `<strong>${station.name}</strong><br>${station.type === 'original' ? 'Original Story' : station.type === 'hub' ? 'Major Hub' : 'Regional Hub'}<br>${station.date}`;
                        stationInfo.style.opacity = '1';
                        
                        setTimeout(() => {
                            stationInfo.style.opacity = '0';
                        }, 3000);
                    }
                });
                
                marker.addEventListener('mouseenter', function() {
                    const station = stations.find(s => s.id === marker.id);
                    if (station) {
                        this.style.transform = 'translate(-50%, -50%) scale(1.5)';
                        this.style.boxShadow = '0 0 10px rgba(204, 0, 0, 0.5)';
                    }
                });
                
                marker.addEventListener('mouseleave', function() {
                    this.style.transform = 'translate(-50%, -50%) scale(1)';
                    this.style.boxShadow = 'none';
                });
            });
        </script>
    </div>
</body>
</html>

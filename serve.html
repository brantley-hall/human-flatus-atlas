<!DOCTYPE html>
<html>
<head>
    <title>Human Flatus Atlas - Local Preview</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: #f0f4f8;
        }
        .header {
            background: linear-gradient(135deg, #4169E1, #008b8b);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .preview-info {
            background: #e8f0fe;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid #4169E1;
        }
        .iframe-container {
            width: 100%;
            height: 800px;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .status {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .status-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            flex: 1;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Human Flatus Atlas - Local Preview</h1>
        <p>Screenshots loaded and ready for review</p>
    </div>
    
    <div class="content">
        <div class="preview-info">
            <h3>📊 Current Status</h3>
            <div class="status">
                <div class="status-item">
                    <strong>CBS Baltimore</strong><br>
                    ✅ 641KB screenshot<br>
                    March 16, 2026
                </div>
                <div class="status-item">
                    <strong>ScienceDaily</strong><br>
                    ✅ 143KB screenshot<br>
                    March 14, 2026
                </div>
                <div class="status-item">
                    <strong>Science News</strong><br>
                    ✅ Top position<br>
                    March 10, 2026
                </div>
            </div>
        </div>
        
        <div class="iframe-container">
            <iframe src="index.html" title="Human Flatus Atlas Website"></iframe>
        </div>
    </div>
</body>
</html>
